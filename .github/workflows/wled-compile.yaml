# Updated WLED Compile Workflow\nname: WLED Compile Workflow\n\non: [push, pull_request]\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n    - name: Check out code\n      uses: actions/checkout@v2\n\n    - name: Set up Node.js\n      uses: actions/setup-node@v2\n      with:\n        node-version: '14'\n\n    - name: Install dependencies\n      run: npm install\n\n    - name: Build project\n      run: npm run build\n\n    - name: Run tests\n      run: npm test\n\n    - name: Deploy to Production\n      run: npm run deploy\n